<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900">
  <defs>
    <filter id="cardShadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <filter id="softShadow" x="-10%" y="-30%" width="120%" height="170%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowMain" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="userSpaceOnUse" viewBox="0 0 10 10">
      <path d="M1.5,1.5 L8.5,5 L1.5,8.5 Q3.2,5 1.5,1.5 Z" fill="#64748B"/>
    </marker>
    <marker id="arrowFeedback" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="userSpaceOnUse" viewBox="0 0 10 10">
      <path d="M1.5,1.5 L8.5,5 L1.5,8.5 Q3.2,5 1.5,1.5 Z" fill="#2563EB"/>
    </marker>
    <style>
      .pageTitle { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 34px; font-weight: 700; fill: #0F172A; }
      .pageSub { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 17px; fill: #64748B; }
      .stageNo { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 13px; font-weight: 700; fill: #FFFFFF; }
      .stageTitle { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 21px; font-weight: 700; fill: #0F172A; }
      .stageDesc { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 14px; fill: #64748B; }
      .cardTitle { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 19px; font-weight: 700; fill: #111827; }
      .cardText { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 14.5px; fill: #475569; }
      .cardMuted { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 13.5px; fill: #64748B; }
      .tagText { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 12.5px; font-weight: 700; fill: #FFFFFF; }
      .noteText { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 15px; fill: #334155; }
      .lane { fill: #FFFFFF; stroke: #E2E8F0; stroke-width: 1.3; filter: url(#cardShadow); }
      .labelPanel { fill: #F8FAFC; stroke: #E2E8F0; stroke-width: 1; }
      .card { fill: #FFFFFF; stroke: #E2E8F0; stroke-width: 1.4; filter: url(#softShadow); }
      .mainArrow { stroke: #64748B; stroke-width: 2.1; fill: none; marker-end: url(#arrowMain); stroke-linecap: round; stroke-linejoin: round; }
      .feedbackArrow { stroke: #2563EB; stroke-width: 1.9; fill: none; marker-end: url(#arrowFeedback); stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 7 7; }
      .connectorLabel { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 13px; fill: #2563EB; }
    </style>
  </defs>

  <rect width="1500" height="900" fill="#F6F8FB"/>
  <circle cx="1385" cy="78" r="52" fill="#FFFFFF" opacity="0.65"/>
  <circle cx="126" cy="812" r="74" fill="#FFFFFF" opacity="0.7"/>

  <text x="750" y="54" text-anchor="middle" class="pageTitle">ui2code 最终优化流程</text>
  <text x="750" y="84" text-anchor="middle" class="pageSub">输入资源先生成可审查 DSL，再结合 UI 框架说明生成 C++ UI 代码，最后通过渲染结果闭环修正</text>

  <!-- Stage 1 -->
  <rect x="52" y="122" width="1396" height="198" rx="24" class="lane"/>
  <rect x="78" y="150" width="174" height="142" rx="18" class="labelPanel"/>
  <rect x="98" y="173" width="40" height="26" rx="13" fill="#2563EB"/>
  <text x="118" y="191" text-anchor="middle" class="stageNo">01</text>
  <text x="98" y="227" class="stageTitle">输入与 DSL</text>
  <text x="98" y="253" class="stageDesc">从图片资源抽取</text>
  <text x="98" y="274" class="stageDesc">结构化 UI 信息</text>

  <rect x="280" y="178" width="170" height="92" rx="18" class="card"/>
  <rect x="300" y="198" width="58" height="24" rx="12" fill="#2563EB"/>
  <text x="329" y="215" text-anchor="middle" class="tagText">Source</text>
  <text x="365" y="238" text-anchor="middle" class="cardTitle">输入源</text>
  <text x="365" y="260" text-anchor="middle" class="cardText">PNG / SVG</text>

  <rect x="500" y="178" width="210" height="92" rx="18" class="card"/>
  <rect x="520" y="198" width="62" height="24" rx="12" fill="#0891B2"/>
  <text x="551" y="215" text-anchor="middle" class="tagText">Parse</text>
  <text x="605" y="238" text-anchor="middle" class="cardTitle">输入预处理</text>
  <text x="605" y="260" text-anchor="middle" class="cardText">尺寸 / 文本 / 资源</text>

  <rect x="760" y="178" width="230" height="92" rx="18" class="card"/>
  <rect x="780" y="198" width="46" height="24" rx="12" fill="#7C3AED"/>
  <text x="803" y="215" text-anchor="middle" class="tagText">AI</text>
  <text x="875" y="238" text-anchor="middle" class="cardTitle">生成 DSL 草稿</text>
  <text x="875" y="260" text-anchor="middle" class="cardText">层级 / 样式 / 语义推断</text>

  <rect x="1040" y="178" width="210" height="92" rx="18" class="card"/>
  <rect x="1060" y="198" width="64" height="24" rx="12" fill="#10B981"/>
  <text x="1092" y="215" text-anchor="middle" class="tagText">Schema</text>
  <text x="1145" y="238" text-anchor="middle" class="cardTitle">规范校验</text>
  <text x="1145" y="260" text-anchor="middle" class="cardText">字段 / 坐标 / 资源</text>

  <rect x="1290" y="178" width="130" height="92" rx="18" class="card"/>
  <rect x="1310" y="198" width="52" height="24" rx="12" fill="#059669"/>
  <text x="1336" y="215" text-anchor="middle" class="tagText">JSON</text>
  <text x="1355" y="238" text-anchor="middle" class="cardTitle">候选稿</text>
  <text x="1355" y="260" text-anchor="middle" class="cardText">dsl.json</text>

  <path d="M450 224 H490" class="mainArrow"/>
  <path d="M710 224 H750" class="mainArrow"/>
  <path d="M990 224 H1030" class="mainArrow"/>
  <path d="M1250 224 H1280" class="mainArrow"/>

  <!-- Stage 2 -->
  <rect x="52" y="352" width="1396" height="198" rx="24" class="lane"/>
  <rect x="78" y="380" width="174" height="142" rx="18" class="labelPanel"/>
  <rect x="98" y="403" width="40" height="26" rx="13" fill="#16A34A"/>
  <text x="118" y="421" text-anchor="middle" class="stageNo">02</text>
  <text x="98" y="457" class="stageTitle">人工门禁</text>
  <text x="98" y="483" class="stageDesc">确认 DSL 语义</text>
  <text x="98" y="504" class="stageDesc">并固化版本</text>

  <rect x="1180" y="408" width="240" height="92" rx="18" class="card"/>
  <rect x="1200" y="428" width="62" height="24" rx="12" fill="#16A34A"/>
  <text x="1231" y="445" text-anchor="middle" class="tagText">Review</text>
  <text x="1300" y="468" text-anchor="middle" class="cardTitle">人工确认 DSL</text>
  <text x="1300" y="490" text-anchor="middle" class="cardText">层级 / 控件 / 文案 / 样式</text>

  <rect x="850" y="408" width="240" height="92" rx="18" class="card"/>
  <rect x="870" y="428" width="66" height="24" rx="12" fill="#F97316"/>
  <text x="903" y="445" text-anchor="middle" class="tagText">Refine</text>
  <text x="970" y="468" text-anchor="middle" class="cardTitle">修正或反馈</text>
  <text x="970" y="490" text-anchor="middle" class="cardText">命名 / 资源 / 语义补充</text>

  <rect x="520" y="408" width="240" height="92" rx="18" class="card"/>
  <rect x="540" y="428" width="54" height="24" rx="12" fill="#0F766E"/>
  <text x="567" y="445" text-anchor="middle" class="tagText">Lock</text>
  <text x="640" y="468" text-anchor="middle" class="cardTitle">DSL 固化</text>
  <text x="640" y="490" text-anchor="middle" class="cardText">approved dsl.json</text>

  <path d="M1355 270 V338 H1300 V398" class="mainArrow"/>
  <path d="M1180 454 H1100" class="mainArrow"/>
  <path d="M850 454 H770" class="mainArrow"/>
  <path d="M970 408 V335 H875 V280" class="feedbackArrow"/>
  <text x="935" y="342" text-anchor="middle" class="connectorLabel">校验不通过，回到 AI 修正</text>

  <!-- Stage 3 -->
  <rect x="52" y="582" width="1396" height="216" rx="24" class="lane"/>
  <rect x="78" y="612" width="174" height="158" rx="18" class="labelPanel"/>
  <rect x="98" y="637" width="40" height="26" rx="13" fill="#EA580C"/>
  <text x="118" y="655" text-anchor="middle" class="stageNo">03</text>
  <text x="98" y="691" class="stageTitle">代码与验证</text>
  <text x="98" y="717" class="stageDesc">按框架说明生成</text>
  <text x="98" y="738" class="stageDesc">并截图对比</text>

  <rect x="280" y="642" width="220" height="96" rx="18" class="card"/>
  <rect x="300" y="663" width="72" height="24" rx="12" fill="#EA580C"/>
  <text x="336" y="680" text-anchor="middle" class="tagText">Context</text>
  <text x="390" y="704" text-anchor="middle" class="cardTitle">准备 AI 上下文</text>
  <text x="390" y="727" text-anchor="middle" class="cardText">DSL + UI 框架说明</text>

  <rect x="550" y="642" width="245" height="96" rx="18" class="card"/>
  <rect x="570" y="663" width="46" height="24" rx="12" fill="#DC2626"/>
  <text x="593" y="680" text-anchor="middle" class="tagText">AI</text>
  <text x="672.5" y="704" text-anchor="middle" class="cardTitle">生成 C++ UI 代码</text>
  <text x="672.5" y="727" text-anchor="middle" class="cardText">.h / .cpp / 资源引用</text>

  <rect x="845" y="642" width="220" height="96" rx="18" class="card"/>
  <rect x="865" y="663" width="58" height="24" rx="12" fill="#9333EA"/>
  <text x="894" y="680" text-anchor="middle" class="tagText">Build</text>
  <text x="955" y="704" text-anchor="middle" class="cardTitle">编译与渲染</text>
  <text x="955" y="727" text-anchor="middle" class="cardText">运行 Demo 并截图</text>

  <rect x="1115" y="642" width="230" height="96" rx="18" class="card"/>
  <rect x="1135" y="663" width="56" height="24" rx="12" fill="#0891B2"/>
  <text x="1163" y="680" text-anchor="middle" class="tagText">Diff</text>
  <text x="1230" y="704" text-anchor="middle" class="cardTitle">视觉对比验证</text>
  <text x="1230" y="727" text-anchor="middle" class="cardText">原图 vs 渲染图</text>

  <rect x="1372" y="671" width="58" height="38" rx="19" fill="#16A34A"/>
  <text x="1401" y="695" text-anchor="middle" class="tagText">通过</text>
  <text x="1401" y="732" text-anchor="middle" class="cardMuted">交付</text>

  <path d="M640 500 V560 H390 V632" class="mainArrow"/>
  <path d="M500 690 H540" class="mainArrow"/>
  <path d="M795 690 H835" class="mainArrow"/>
  <path d="M1065 690 H1105" class="mainArrow"/>
  <path d="M1345 690 H1362" class="mainArrow"/>
  <path d="M1230 642 V612 H672.5 V632" class="feedbackArrow"/>
  <text x="948" y="620" text-anchor="middle" class="connectorLabel">不通过，反馈给 AI 修正代码或 DSL</text>

  <rect x="208" y="826" width="1084" height="46" rx="23" fill="#FFFFFF" stroke="#E2E8F0" filter="url(#softShadow)"/>
  <text x="750" y="855" text-anchor="middle" class="noteText">关键原则：AI 生成初稿，DSL 做人工门禁，代码生成依赖框架说明，最终用渲染截图验证质量。</text>
</svg>
